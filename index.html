<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VC Contabilidade Digital — Em breve</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/webp" href="assets/vireicontador/favicon_vireicontador.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #00BCAE;
      --color-secondary: #265C54;
      --color-text-strong: #1E0830;
      --color-text-body: #4A4156;
      --color-background: #FFFFFF;
      --color-background-alt: #F6F4F8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--color-background) 0%, var(--color-background-alt) 100%);
      color: var(--color-text-strong);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 480px; }
    .logo { height: 40px; width: auto; margin-bottom: 48px; }
    h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }
    h1 span { color: var(--color-primary); }
    p {
      font-size: 1.05rem;
      color: var(--color-text-body);
      line-height: 1.6;
    }
    .badge {
      display: inline-block;
      margin-top: 32px;
      padding: 8px 20px;
      border-radius: 999px;
      background: rgba(0, 188, 174, 0.12);
      color: var(--color-secondary);
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="assets/vireicontador/logo-vcdigital-roxo.webp" alt="VC Contabilidade Digital">
    <h1>Em <span>breve</span></h1>
    <p>Estamos preparando algo novo para você. Volte em breve para conferir.</p>
    <span class="badge">Novidades a caminho</span>
  </div>
</body>
</html>
